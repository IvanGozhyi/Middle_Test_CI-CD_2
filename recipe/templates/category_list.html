{% extends 'base.html' %}

{% block content %}
  <div class="container">
    <h1 class="my-4">Category List</h1>
    <ul class="list-group">
      {% for category in categories %}
        <li class="list-group-item d-flex justify-content-between align-items-center">
          {{ category.name }}
          <span class="badge bg-primary rounded-pill">{{ category.recipe_count }} recipes</span>
        </li>
      {% empty %}
        <li class="list-group-item">No categories found.</li>
      {% endfor %}
    </ul>
  </div>
{% endblock %}
