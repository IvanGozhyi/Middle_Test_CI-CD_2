{% extends 'base.html' %}

{% block content %}
  <div class="container">
    <div class="d-flex justify-content-between align-items-center my-4">
  <h1>Category List</h1>
  <a href="{% url 'recipe:main' %}" class="btn btn-outline-secondary">Back to Home</a>
</div>

    <ul class="list-group">
      {% for category in categories %}
        <li class="list-group-item d-flex justify-content-between align-items-center">
          {{ category.name }}
          <span class="badge bg-primary rounded-pill">{{ category.recipe_count }} recipes</span>
        </li>
      {% empty %}
        <li class="list-group-item">No categories found.</li>
      {% endfor %}
    </ul>
  </div>
{% endblock %}
